global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: galileo-observabilidad

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: alloy
    static_configs:
      - targets: [localhost:12345]
    metrics_path: /metrics