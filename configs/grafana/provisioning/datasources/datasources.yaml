apiVersion: 1

datasources:

  # ── Prometheus — Métricas ────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    jsonData:
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  # ── Loki — Logs ──────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://localhost:3100
    isDefault: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Correlación automática log → traza (busca traceId en el log)
        - name: TraceID
          matcherRegex: "[Tt]race[_-]?[Ii][Dd][=: ]+([a-fA-F0-9]{16,32})"
          url: "${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: Ver traza en Tempo

  # ── Tempo — Trazas distribuidas ───────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://localhost:3200
    isDefault: false
    jsonData:
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: prometheus
      lokiSearch:
        datasourceUid: loki
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
      spanBar:
        type: Tag
        tag: http.url
